services:
  cztorznab-proxy:
    image: ghcr.io/aladinecek/cztorznab-proxy:latest
    # Building from source instead of pulling (requires cloning this repo
    # first, see README > Development): comment out `image:` above and
    # uncomment the line below.
    # build: .
    container_name: cztorznab-proxy
    restart: unless-stopped
    environment:
      JACKETT_URL: http://jackett:9117 # <-- EDIT: your Jackett's address
      LOG_LEVEL: INFO
      TMDB_API_KEY: "" # <-- OPTIONAL: set to translate Czech titles to English (themoviedb.org/settings/api)
    volumes:
      - tmdb_cache:/app/cache
    ports:
      - "9118:8000"
    networks:
      - media

networks:
  media:
    external: true
    name: media-stack_default # <-- EDIT: the Docker network your Jackett is on

volumes:
  tmdb_cache:
